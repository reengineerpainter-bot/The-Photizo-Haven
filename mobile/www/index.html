<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a12" />
    <title>The Photizo Haven</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #0a0a12;
        color: #e8e8f0;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      .card {
        max-width: 360px;
        padding: 32px 24px;
        border-radius: 16px;
        border: 1px solid rgba(0, 229, 255, 0.25);
        background: rgba(18, 18, 31, 0.9);
        box-shadow: 0 0 32px rgba(0, 229, 255, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
        color: #00e5ff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.5;
        color: #8b8ba3;
      }
      code {
        color: #00ff9d;
        font-size: 0.8rem;
      }
      .spinner {
        width: 32px;
        height: 32px;
        margin: 20px auto 0;
        border: 3px solid rgba(0, 229, 255, 0.2);
        border-top-color: #00e5ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>The Photizo Haven</h1>
      <p id="message">Starting app…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
    <script>
      // When CAPACITOR_SERVER_URL is not set, this shell is shown.
      // Configure server.url in capacitor.config.ts and re-sync.
      var msg = document.getElementById("message");
      if (typeof window !== "undefined" && !window.Capacitor) {
        msg.textContent =
          "Open via the native app, or set CAPACITOR_SERVER_URL and run npm run cap:sync.";
      }
    </script>
  </body>
</html>
